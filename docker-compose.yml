# This is for joint testing.
services:
  web:
    build:
      context: .
      dockerfile: ./_joint_test/Dockerfile
    working_dir: /src/_joint_test
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - PORT=8080
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=testdb
      - DB_PORT=5432
    volumes:
      - .:/src
    depends_on:
      - db
  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdb
    volumes:
      - test-db:/var/lib/postgresql
volumes:
  test-db:
